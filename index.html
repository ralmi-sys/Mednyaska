<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для самой прекрасной Медни</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ffafbd;
            --dark-pink: #ffc3a0;
            --heart-color: #ff4d6d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--main-pink), var(--dark-pink));
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            width: 340px;
            z-index: 10;
            border: 2px solid white;
        }

        .heart-icon {
            position: relative;
            width: 80px;
            height: 70px;
            margin: 0 auto 30px;
            animation: beat 1.2s infinite;
        }

        .heart-icon:before, .heart-icon:after {
            position: absolute;
            content: "";
            left: 40px;
            top: 0;
            width: 40px;
            height: 65px;
            background: var(--heart-color);
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-icon:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d63384;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
        }

        #compliment-box {
            min-height: 80px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            color: #444;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .main-btn {
            background: var(--heart-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
            width: 100%;
            letter-spacing: 1px;
        }

        .main-btn:active { transform: scale(0.92); }

        .floating-heart {
            position: absolute;
            color: white;
            pointer-events: none;
            animation: move linear infinite;
            z-index: 1;
        }

        @keyframes move {
            from { transform: translateY(100vh) scale(0.5); opacity: 1; }
            to { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-icon"></div>
        <h1>Для Медни ❤️</h1>
        <div id="compliment-box">Нажми на кнопку ниже...</div>
        <button class="main-btn" onclick="showCompliment()">МЕДНЯШКА</button>
    </div>

    <script>
        // База из 100+ вариантов (комбинации + уникальные фразы)
        const baseCompliments = [
            "Медни, ты — самое светлое, что есть в моей жизни! ✨",
            "Медни, твоя улыбка заставляет мое сердце биться чаще ❤️",
            "Самая милая девушка по имени Медни — это ты! 🌸",
            "Медни, ты моё бесконечное вдохновение 💖",
            "Нет никого прекраснее тебя, Медни! 😍",
            "Медни, ты — мой ангел-хранитель 👼",
            "Твои глаза, Медни, светят ярче всех звезд ✨",
            "Ты — солнце, которое греет меня всегда, Медни! ☀️",
            "Медни, ты невероятно талантливая и умная! 🧠❤️",
            "Медни, ты — причина моей самой искренней улыбки 🥰",
            "Твой голос для меня — лучшая музыка, Медни 🎶",
            "Медни, ты — мечта, ставшая реальностью ✨",
            "Ты самая добрая и нежная, Медни! 💞",
            "Медни, я готов любоваться тобой вечно 🌹",
            "Ты просто космос, Медни! 🌌",
            "Медни, ты — моё сокровище! 💎",
            "Рядом с тобой, Медни, я самый счастливый 💖",
            "Медни, ты — чудо, которое случилось со мной! ✨",
            "Самая очаровательная Медни на свете! 😊",
            "Медни, ты — само совершенство 👑"
        ];

        const adjectives = [
            "прекрасная", "неповторимая", "сказочная", "волшебная", "искренняя", 
            "завораживающая", "яркая", "милая", "лучшая", "сияющая", 
            "обаятельная", "классная", "нежная", "стильная", "удивительная",
            "неземная", "вдохновляющая", "добрая", "чудесная", "золотая"
        ];

        const endings = [
            "во всем мире! 🌏", "в моей жизни! ❤️", "каждую секунду! ⏱️", 
            "сегодня и всегда! ♾️", "без всяких сомнений! ✅", "в этой вселенной! 🌌",
            "какой я только знаю! 🌹", "просто вау! 🔥", "и я это ценю! 🙏", "самая-самая! ✨"
        ];

        const emojis = ["❤️", "💖", "✨", "🌸", "💎", "🦋", "🌷", "🐱", "🐥", "🍬", "🍭", "🧸", "🎀"];

        // Собираем массив до 100+
        const finalCompliments = [...baseCompliments];
        
        for (let i = 0; i < 90; i++) {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const end = endings[Math.floor(Math.random() * endings.length)];
            const emo = emojis[Math.floor(Math.random() * emojis.length)];
            finalCompliments.push(`Медни, ты ${adj} ${end} ${emo}`);
        }

        function showCompliment() {
            const box = document.getElementById('compliment-box');
            // Эффект появления
            box.style.opacity = 0;
            setTimeout(() => {
                const randomIdx = Math.floor(Math.random() * finalCompliments.length);
                box.innerText = finalCompliments[randomIdx];
                box.style.opacity = 1;
            }, 150);
            
            // Создаем сразу несколько сердечек при нажатии
            for(let i=0; i<3; i++) {
                setTimeout(createHeart, i * 200);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.classList.add('floating-heart');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            h.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }

        // Постоянный легкий фон из сердечек
        setInterval(createHeart, 2000);
    </script>
</body>
</html>
